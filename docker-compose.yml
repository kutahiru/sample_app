services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    environment:
      RAILS_ENV: development
      TZ: Asia/Tokyo
      DB_HOST: db
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: ""
      DB_NAME: sample_app_development
      DB_TEST_NAME: sample_app_test
    depends_on:
      - db
    tty: true
    stdin_open: true

  db:
    image: mysql:8.0
    platform: linux/arm64
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: sample_app_development
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  bundle_data:
  mysql_data:
